name: Build Geode Mod

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 THIS installs binaries automatically
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          combine: false   # IMPORTANT (you already did this 👍)

      - name: Inspect geode
        run: unzip -l build/*.geode

      # 📤 Upload ALL .geode files (fixes your earlier issue)
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: build/**/*.geode
