name: Build Replay Saver

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 🧰 Install system deps
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build cmake python3 python3-pip zip

      # 📦 Install Geode CLI (IMPORTANT)
      - name: Install Geode CLI
        run: |
          pip3 install geode-sdk

      # 📦 Clone Geode SDK (headers + cmake)
      - name: Setup Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git geode-sdk
          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      # 🔥 Install loader binaries (FIXES linking error)
      - name: Install Geode binaries
        run: |
          geode sdk install-binaries

      # ⚙️ Configure build (Android)
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET_PLATFORM=Android64

      # 🔨 Build
      - name: Build
        run: |
          cmake --build build

      # 📦 Manual packaging (THE KEY FIX)
      - name: Package mod
        run: |
          mkdir -p package/android64
          cp build/crxptos.replay_saver.android64.so package/android64/
          cp mod.json package/
          cd package
          zip -r ReplaySaver.geode *

      # 📤 Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: package/ReplaySaver.geode
