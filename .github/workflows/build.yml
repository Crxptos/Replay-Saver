name: Build Replay Saver

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build cmake zip

      - name: Setup Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git geode-sdk
          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET_PLATFORM=Android64 \
            -DGEODE_DISABLE_LOADER=ON

      - name: Build
        run: |
          cmake --build build

      - name: Package mod
        run: |
          mkdir -p package/android64
          cp build/crxptos.replay_saver.android64.so package/android64/
          cp mod.json package/
          cd package
          zip -r ReplaySaver.geode *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: package/ReplaySaver.geode
