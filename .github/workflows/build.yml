name: Build Replay Saver

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🧰 Install deps
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build cmake python3 git zip

      # 📦 Clone Geode SDK
      - name: Setup Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git geode-sdk
          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      # 🔥 Install Geode CLI (REAL way)
      - name: Install Geode CLI
        run: |
          git clone https://github.com/geode-sdk/cli.git geode-cli
          cd geode-cli
          chmod +x geode
          echo "$PWD" >> $GITHUB_PATH

      # 🔥 Install binaries
      - name: Install Geode binaries
        run: |
          geode sdk install-binaries

      # ⚙️ Configure
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET_PLATFORM=Android64

      # 🔨 Build
      - name: Build
        run: |
          cmake --build build

      # 📦 Package manually (guaranteed working)
      - name: Package mod
        run: |
          mkdir -p package/android64
          cp build/crxptos.replay_saver.android64.so package/android64/
          cp mod.json package/
          cd package
          zip -r ReplaySaver.geode *

      # 📤 Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: package/ReplaySaver.geode
