name: Build Replay Saver (Fixed)

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Get code
      - name: Checkout
        uses: actions/checkout@v4

      # 🔨 Build with Geode (this part already works)
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          geode-version: v5.4.1
          use-mod-json-geode: false
          
      # 🔍 Inspect original (debug)
      - name: Inspect original geode
        run: |
          echo "---- ORIGINAL CONTENT ----"
          unzip -l build/*.geode

      # 🔥 FIX PACKAGING (FORCE MOVE .so)
      - name: Fix and repackage mod
        run: |
          rm -rf fixed
          mkdir fixed
          cd fixed

          unzip ../build/*.geode

          mkdir -p android64

          echo "---- BEFORE MOVE ----"
          ls

          # 💀 FORCE move ANY android64 binary
          for f in *.android64.so; do
            if [ -f "$f" ]; then
              echo "Moving $f → android64/"
              mv "$f" android64/
            fi
          done

          echo "---- AFTER MOVE ----"
          ls -R

          # 🚨 HARD FAIL if still wrong
          if [ ! -f "android64/"*.android64.so ]; then
            echo "ERROR: .so not inside android64!"
            exit 1
          fi

          zip -r ReplaySaver.geode *

      # 📤 Upload fixed mod
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: fixed/ReplaySaver.geode
