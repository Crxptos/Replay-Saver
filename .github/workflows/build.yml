name: Build Replay Saver (Nightly Compatible)

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔨 Build with REAL version (important)
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          geode-version: v5.4.1

      # 🔍 Debug original
      - name: Inspect original geode
        run: |
          echo "---- ORIGINAL CONTENT ----"
          unzip -l build/*.geode

      # 🧠 PATCH mod.json (THIS FIXES NIGHTLY)
      - name: Patch mod.json for nightly
        run: |
          rm -rf temp
          mkdir temp
          unzip build/*.geode -d temp

          echo "---- BEFORE PATCH ----"
          cat temp/mod.json

          # 🔥 Replace geode version with wildcard
          sed -i 's/"geode": *"[^"]*"/"geode": "999.0.0"/' temp/mod.json

          echo "---- AFTER PATCH ----"
          cat temp/mod.json

          cd temp
          zip -r ../patched.geode *

      # 🔥 FIX PACKAGING
      - name: Fix and repackage mod
        run: |
          rm -rf fixed
          mkdir fixed
          cd fixed

          unzip ../patched.geode

          mkdir -p android64

          echo "---- BEFORE MOVE ----"
          ls

          # 💀 Move .so properly
          for f in *.android64.so; do
            if [ -f "$f" ]; then
              echo "Moving $f → android64/"
              mv "$f" android64/
            fi
          done

          echo "---- AFTER MOVE ----"
          ls -R

          # 🚨 Fail if missing
          if [ ! -f android64/*.android64.so ]; then
            echo "ERROR: .so not inside android64!"
            exit 1
          fi

          zip -r ReplaySaver.geode *

      # 📤 Upload final mod
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: fixed/ReplaySaver.geode
