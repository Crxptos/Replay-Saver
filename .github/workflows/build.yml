name: Build Replay Saver (Stable + Nightly)

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 🔨 Build with real Geode version (IMPORTANT)
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          geode-version: v5.4.1

      # 🔍 Inspect original (optional debug)
      - name: Inspect original geode
        run: |
          echo "---- ORIGINAL CONTENT ----"
          unzip -l build/*.geode

      # 🧠 Patch ONLY geode version (keeps settings!)
      - name: Patch mod.json for nightly
        run: |
          rm -rf temp
          mkdir temp
          unzip build/*.geode -d temp

          echo "---- BEFORE PATCH ----"
          cat temp/mod.json

          # 🔥 Replace ONLY geode version
          sed -i 's/"geode": *"[^"]*"/"geode": "999.0.0"/' temp/mod.json

          echo "---- AFTER PATCH ----"
          cat temp/mod.json

          cd temp
          zip -r ../patched.geode *

      # 🔥 Fix Android structure (CRITICAL)
      - name: Fix and repackage mod
        run: |
          rm -rf fixed
          mkdir fixed
          cd fixed

          unzip ../patched.geode

          mkdir -p android/arm64-v8a

          echo "---- BEFORE MOVE ----"
          ls

          # 🔥 Move + rename .so correctly
          for f in *.android64.so; do
            if [ -f "$f" ]; then
              echo "Moving $f → android/arm64-v8a/crxptos.replay_saver.so"
              mv "$f" android/arm64-v8a/crxptos.replay_saver.so
            fi
          done

          echo "---- AFTER MOVE ----"
          ls -R

          # 🚨 Fail if missing
          if [ ! -f android/arm64-v8a/crxptos.replay_saver.so ]; then
            echo "ERROR: .so not in correct Android path!"
            exit 1
          fi

          zip -r ReplaySaver.geode *

      # 🔍 Verify final mod.json (IMPORTANT DEBUG)
      - name: Verify final mod.json
        run: |
          echo "---- FINAL MOD.JSON ----"
          unzip -p fixed/ReplaySaver.geode mod.json

      # 📤 Upload final mod
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: fixed/ReplaySaver.geode
