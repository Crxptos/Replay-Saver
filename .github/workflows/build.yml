name: Build Replay Saver

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Get code
      - name: Checkout
        uses: actions/checkout@v4

      # 🧰 Install tools
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build cmake python3 zip

      # 📦 Clone Geode SDK
      - name: Setup Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git geode-sdk
          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      # 🔥 Install loader binaries (FIXES your error)
      - name: Install Geode binaries
        run: |
          cd geode-sdk
          python3 setup.py install-binaries

      # ⚙️ Configure build
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGEODE_TARGET_PLATFORM=Android64

      # 🔨 Build mod
      - name: Build
        run: |
          cmake --build build

      # 📦 Manual packaging (THIS is the magic fix)
      - name: Package mod
        run: |
          mkdir -p package/android64
          cp build/crxptos.replay_saver.android64.so package/android64/
          cp mod.json package/
          cd package
          zip -r ReplaySaver.geode *

      # 📤 Upload result
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReplaySaver
          path: package/ReplaySaver.geode
